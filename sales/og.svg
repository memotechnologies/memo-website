<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title">
  <title id="title">Memo — The agent that turns notes and meetings into action</title>
  <defs>
    <radialGradient id="glow" cx="50%" cy="44%" r="55%">
      <stop offset="0%" stop-color="#A0532F" stop-opacity="0.18"/>
      <stop offset="35%" stop-color="#e8dcc8" stop-opacity="0.55"/>
      <stop offset="80%" stop-color="#f8f3e6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#f8f3e6"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <g transform="translate(96 92)">
    <rect x="0" y="0" width="92" height="92" rx="14" fill="#e8dcc8"/>
    <text x="46" y="68" font-family="ui-serif, 'Source Serif 4', Georgia, serif" font-size="62" font-weight="600" fill="#1a1612" text-anchor="middle">M</text>
  </g>
  <g transform="translate(96 240)" font-family="ui-serif, 'Source Serif 4', Georgia, serif" fill="#1a1612">
    <text font-size="78" font-weight="500" letter-spacing="-2">Your note-taker records it.</text>
    <text y="92" font-size="78" font-weight="500" font-style="italic" fill="#A0532F" letter-spacing="-2">Memo acts on it.</text>
    <text y="186" font-size="30" font-weight="400" fill="#463e33" font-family="Inter, -apple-system, 'Segoe UI', sans-serif">A sales agent that turns notes and meetings into CRM updates,</text>
    <text y="226" font-size="30" font-weight="400" fill="#463e33" font-family="Inter, -apple-system, 'Segoe UI', sans-serif">drafted follow-ups, and the next steps that should follow.</text>
  </g>
  <g transform="translate(96 552)" font-family="Inter, -apple-system, 'Segoe UI', sans-serif" fill="#847866">
    <text font-size="20" font-weight="600" letter-spacing="3">SENTMEMO.COM</text>
  </g>
</svg>
